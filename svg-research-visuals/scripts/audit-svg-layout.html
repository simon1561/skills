<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>SVG layout audit</title></head>
<body>
  <object id="target" type="image/svg+xml"></object>
  <pre id="result">PENDING</pre>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    const target = document.getElementById('target');
    const result = document.getElementById('result');
    target.data = '../examples/visual-smoke-suite/' + file;

    const pad = (n) => Math.round(n * 10) / 10;
    const containsPoint = (r, x, y) => x >= r.x && x <= r.x + r.width && y >= r.y && y <= r.y + r.height;
    const intersect = (a, b, tolerance = 1) =>
      Math.min(a.x + a.width, b.x + b.width) - Math.max(a.x, b.x) > tolerance &&
      Math.min(a.y + a.height, b.y + b.height) - Math.max(a.y, b.y) > tolerance;

    function rootBox(el) {
      const b = el.getBBox();
      const m = el.getCTM();
      const points = [
        new DOMPoint(b.x, b.y), new DOMPoint(b.x + b.width, b.y),
        new DOMPoint(b.x, b.y + b.height), new DOMPoint(b.x + b.width, b.y + b.height)
      ].map(p => p.matrixTransform(m));
      const xs = points.map(p => p.x), ys = points.map(p => p.y);
      return { x:Math.min(...xs), y:Math.min(...ys), width:Math.max(...xs)-Math.min(...xs), height:Math.max(...ys)-Math.min(...ys) };
    }

    target.addEventListener('load', () => {
      const doc = target.contentDocument;
      const svg = doc.documentElement;
      const view = svg.viewBox.baseVal;
      const bounds = {x:view.x, y:view.y, width:view.width, height:view.height};
      const errors = [];
      const labelledBy = (svg.getAttribute('aria-labelledby') || '').trim().split(/\s+/).filter(Boolean);
      if (svg.getAttribute('role') !== 'img') errors.push('无障碍元数据 | 根元素缺少 role="img"');
      if (labelledBy.length < 2) errors.push('无障碍元数据 | 缺少 aria-labelledby="title desc"');
      for (const id of labelledBy) {
        const el = doc.getElementById(id);
        if (!el || !el.textContent.trim()) errors.push(`无障碍元数据 | 缺少有效的 #${id}`);
      }
      if (!doc.querySelector('title')?.textContent.trim()) errors.push('无障碍元数据 | 缺少有效的 <title>');
      if (!doc.querySelector('desc')?.textContent.trim()) errors.push('无障碍元数据 | 缺少有效的 <desc>');
      const texts = [...doc.querySelectorAll('text')].filter(el => el.getBBox().width > 0).map((el, i) => ({el, i, box:rootBox(el), value:(el.textContent || '').trim()}));
      const rects = [...doc.querySelectorAll('rect')].filter(el => el.getBBox().width > 0).map(el => ({el, box:rootBox(el)}));

      for (const t of texts) {
        const b = t.box;
        if (b.x < bounds.x-0.5 || b.y < bounds.y-0.5 || b.x+b.width > bounds.x+bounds.width+0.5 || b.y+b.height > bounds.y+bounds.height+0.5) {
          errors.push(`SVG越界 | ${t.value} | bbox=${JSON.stringify(b)}`);
        }
        const cx=b.x+b.width/2, cy=b.y+b.height/2;
        const candidates = rects.filter(r => containsPoint(r.box,cx,cy) && r.box.width < bounds.width-1 && r.box.height < bounds.height-1).sort((a,b)=>a.box.width*a.box.height-b.box.width*b.box.height);
        if (!candidates.length) continue;
        const c = candidates[0].box;
        const inset = {l:b.x-c.x, r:c.x+c.width-(b.x+b.width), t:b.y-c.y, b:c.y+c.height-(b.y+b.height)};
        if (Math.min(inset.l,inset.r,inset.t,inset.b) < -0.5) {
          errors.push(`容器越界 | ${t.value} | inset=${JSON.stringify(Object.fromEntries(Object.entries(inset).map(([k,v])=>[k,pad(v)])))}`);
        }
      }

      for (const {box:c} of rects) {
        if (c.height > 120 || c.width > 900) continue;
        const group = texts.filter(t => containsPoint(c, t.box.x+t.box.width/2, t.box.y+t.box.height/2));
        if (!group.length) continue;
        const left=Math.min(...group.map(t=>t.box.x)), right=Math.max(...group.map(t=>t.box.x+t.box.width));
        const top=Math.min(...group.map(t=>t.box.y)), bottom=Math.max(...group.map(t=>t.box.y+t.box.height));
        const topPad=top-c.y, bottomPad=c.y+c.height-bottom;
        if (Math.abs(topPad-bottomPad) > 8) {
          errors.push(`上下留白失衡 | ${group.map(t=>t.value).join(' / ')} | top=${pad(topPad)} bottom=${pad(bottomPad)}`);
        }
        if (left < c.x-0.5 || right > c.x+c.width+0.5) {
          errors.push(`组件横向越界 | ${group.map(t=>t.value).join(' / ')}`);
        }
      }

      for (let i=0;i<texts.length;i++) for (let j=i+1;j<texts.length;j++) {
        if (intersect(texts[i].box,texts[j].box)) errors.push(`文字重叠 | ${texts[i].value} <> ${texts[j].value}`);
      }

      result.textContent = errors.length ? `FAIL\n${errors.join('\n')}` : 'PASS';
      document.body.dataset.audit = errors.length ? 'fail' : 'pass';
    });
  </script>
</body>
</html>
