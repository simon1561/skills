<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">条件与证伪：把判断变成可观察信号</title>
  <desc id="desc">并列展示判断成立时应出现的证据与降低置信度的证伪信号。</desc>
  <style>
    text { font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
    .title { font-size:48px; font-weight:800; fill:#24221e; }.sub { font-size:22px; font-weight:400; fill:#68645c; }
    .h { font-size:25px; font-weight:700; fill:#24221e; }.body { font-size:19px; font-weight:400; fill:#45433e; }.note { font-size:16px; font-weight:400; fill:#77736b; }
    .num { font-size:18px; font-weight:800; fill:#f0e8da; font-variant-numeric:tabular-nums lining-nums; font-feature-settings:"tnum" 1,"lnum" 1; }
  </style>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text x="70" y="75" class="title">条件与证伪：把判断变成可观察信号</text>
  <text x="70" y="116" class="sub">示例内容，仅测试双边论证的对称性、证据层级与警示色的克制使用</text>
  <line x1="70" y1="148" x2="1530" y2="148" stroke="#dedbd3" stroke-width="2"/>
  <rect x="70" y="205" width="690" height="555" rx="16" fill="#fffdf9" stroke="#dedbd3" stroke-width="1.5"/>
  <rect x="70" y="205" width="10" height="555" rx="5" fill="#c17a45"/>
  <text x="110" y="258" class="h">判断成立时，应看到什么</text>
  <text x="110" y="292" class="note">不是“好消息清单”，而是支持判断的必要证据</text>
  <g stroke="#e6e3dc" stroke-width="1.5"><line x1="110" y1="338" x2="720" y2="338"/><line x1="110" y1="452" x2="720" y2="452"/><line x1="110" y1="566" x2="720" y2="566"/></g>
  <g fill="#7a4a28"><circle cx="140" cy="378" r="17"/><circle cx="140" cy="492" r="17"/><circle cx="140" cy="606" r="17"/></g>
  <g class="num" text-anchor="middle"><text x="140" y="384">1</text><text x="140" y="498">2</text><text x="140" y="612">3</text></g>
  <g class="h"><text x="180" y="374">核心指标改善</text><text x="180" y="488">单位经济稳定</text><text x="180" y="602">资本投入有回报</text></g>
  <g class="body"><text x="180" y="406">增长、转化或留存持续优于基准</text><text x="180" y="520">收入增长不依赖持续加大补贴</text><text x="180" y="634">新增投入没有吞噬自由现金流</text></g>

  <rect x="840" y="205" width="690" height="555" rx="16" fill="#fdf6f3" stroke="#e6d0ca" stroke-width="1.5"/>
  <rect x="840" y="205" width="10" height="555" rx="5" fill="#9a5048"/>
  <text x="880" y="258" class="h">出现这些，应降低置信度</text>
  <text x="880" y="292" class="note">不是短期噪音，而是足以改变原判断的反证</text>
  <g stroke="#ecdcd6" stroke-width="1.5"><line x1="880" y1="338" x2="1490" y2="338"/><line x1="880" y1="452" x2="1490" y2="452"/><line x1="880" y1="566" x2="1490" y2="566"/></g>
  <g fill="#9a5048"><circle cx="910" cy="378" r="17"/><circle cx="910" cy="492" r="17"/><circle cx="910" cy="606" r="17"/></g>
  <g class="num" text-anchor="middle"><text x="910" y="384">1</text><text x="910" y="498">2</text><text x="910" y="612">3</text></g>
  <g class="h"><text x="950" y="374">核心指标持续恶化</text><text x="950" y="488">增长依赖更高补贴</text><text x="950" y="602">投入回报长期不达标</text></g>
  <g class="body"><text x="950" y="406">并且无法由季节性或口径变化解释</text><text x="950" y="520">单位经济没有同步改善</text><text x="950" y="634">现金消耗超出原先的安全缓冲</text></g>
  <rect x="70" y="800" width="1460" height="56" rx="12" fill="#f7f1dc" stroke="#e6ddbd" stroke-width="1.5"/>
  <text x="105" y="838" font-size="23" font-weight="800" fill="#9c5f2a">条件与证伪图的重点不是“多空对骂”，而是让结论能被未来事实检验。</text>
  <text x="70" y="882" class="note">视觉压力测试 10｜检查双边对称、证据粒度、警示色比例与阅读路径</text>
</svg>
