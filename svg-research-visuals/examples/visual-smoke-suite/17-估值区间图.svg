<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">估值区间图：统一横轴比较赔率与不确定性</title>
  <desc id="desc">用虚构数据演示六家公司共享横轴的估值区间图，横条表示下行至上行价值，圆点为基准价值，菱形为现价，并按基准上行空间排序。</desc>
  <style>
    text{font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif}
    .title{font-size:48px;font-weight:800;fill:#24221e}.sub{font-size:23px;font-weight:400;fill:#68645c}
    .card{fill:#fffdf9;stroke:#dedbd3;stroke-width:2}.h{font-size:23px;font-weight:700;fill:#24221e}
    .body{font-size:18px;font-weight:400;fill:#45433e}.note{font-size:15px;font-weight:400;fill:#77736b}
    .axis{font-size:15px;font-weight:400;fill:#77736b}.up{font-size:18px;font-weight:800;fill:#7a4a28}
    .num{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum" 1,"lnum" 1}
  </style>
  <rect width="1600" height="1000" fill="#fbfaf7"/>
  <text x="70" y="76" class="title">估值区间图：统一横轴比较赔率与不确定性</text>
  <text x="70" y="116" class="sub">示例数据｜每股价值（元）｜按基准价值相对现价的上行空间排序｜区间宽度表达估值不确定性</text>
  <line x1="70" y1="146" x2="1530" y2="146" stroke="#dedbd3" stroke-width="2"/>

  <rect x="70" y="185" width="1460" height="595" rx="12" class="card"/>
  <text x="105" y="230" class="h">标的</text><text x="250" y="230" class="h">基准上行</text>
  <g transform="translate(775 215)">
    <line x1="0" y1="0" x2="58" y2="0" stroke="#c08c52" stroke-width="10" stroke-linecap="round"/>
    <text x="72" y="6" class="note">估值区间</text>
    <circle cx="190" cy="0" r="7" fill="#c17a45"/>
    <text x="206" y="6" class="note">基准价值</text>
    <path d="M330 -8 L338 0 L330 8 L322 0 Z" fill="#24221e"/>
    <text x="348" y="6" class="note">现价</text>
  </g>

  <!-- shared plot grid -->
  <g stroke="#e6e3dc" stroke-width="1.5">
    <path d="M350 265V735 M656 265V735 M961 265V735 M1267 265V735 M1420 265V735"/>
    <path d="M100 340H1495 M100 420H1495 M100 500H1495 M100 580H1495 M100 660H1495 M100 740H1495"/>
  </g>
  <g class="axis num" text-anchor="middle">
    <text x="350" y="765">40</text><text x="656" y="765">80</text><text x="961" y="765">120</text><text x="1267" y="765">160</text><text x="1420" y="765">180</text>
  </g>

  <!-- row labels -->
  <g class="h"><text x="105" y="310">公司 A</text><text x="105" y="390">公司 B</text><text x="105" y="470">公司 C</text><text x="105" y="550">公司 D</text><text x="105" y="630">公司 E</text><text x="105" y="710">公司 F</text></g>
  <g class="up num" text-anchor="end"><text x="305" y="310">+50%</text><text x="305" y="390">+42%</text><text x="305" y="470">+36%</text><text x="305" y="550">+30%</text><text x="305" y="630">+20%</text><text x="305" y="710">+11%</text></g>

  <!-- valuation ranges -->
  <g stroke="#c08c52" stroke-width="12" stroke-linecap="round">
    <line x1="618" y1="300" x2="1229" y2="300"/><line x1="656" y1="380" x2="1305" y2="380"/>
    <line x1="503" y1="460" x2="999" y2="460"/><line x1="694" y1="540" x2="1343" y2="540"/>
    <line x1="771" y1="620" x2="1229" y2="620"/><line x1="656" y1="700" x2="1038" y2="700"/>
  </g>
  <g stroke="#7a4a28" stroke-width="2">
    <path d="M618 287V313 M1229 287V313 M656 367V393 M1305 367V393 M503 447V473 M999 447V473 M694 527V553 M1343 527V553 M771 607V633 M1229 607V633 M656 687V713 M1038 687V713"/>
  </g>

  <!-- baseline circles -->
  <g fill="#c17a45">
    <circle cx="961" cy="300" r="9"/><circle cx="1022" cy="380" r="9"/><circle cx="771" cy="460" r="9"/>
    <circle cx="1038" cy="540" r="9"/><circle cx="1053" cy="620" r="9"/><circle cx="847" cy="700" r="9"/>
  </g>
  <!-- current-price diamonds -->
  <g fill="#24221e">
    <path d="M656 289 L667 300 L656 311 L645 300 Z"/><path d="M732 369 L743 380 L732 391 L721 380 Z"/>
    <path d="M579 449 L590 460 L579 471 L568 460 Z"/><path d="M809 529 L820 540 L809 551 L798 540 Z"/>
    <path d="M885 609 L896 620 L885 631 L874 620 Z"/><path d="M771 689 L782 700 L771 711 L760 700 Z"/>
  </g>

  <!-- direct values -->
  <g class="note num" text-anchor="middle">
    <text x="618" y="281">75</text><text x="1229" y="281">155</text><text x="961" y="326">120</text>
    <text x="656" y="361">80</text><text x="1305" y="361">165</text><text x="1022" y="406">128</text>
    <text x="503" y="441">60</text><text x="999" y="441">125</text><text x="771" y="486">95</text>
    <text x="694" y="521">85</text><text x="1343" y="521">170</text><text x="1038" y="566">130</text>
    <text x="771" y="601">95</text><text x="1229" y="601">155</text><text x="1053" y="646">132</text>
    <text x="656" y="681">80</text><text x="1038" y="681">130</text><text x="847" y="726">105</text>
  </g>

  <rect x="70" y="835" width="1460" height="100" rx="12" fill="#f7f1dc" stroke="#e6ddbd" stroke-width="1.5"/>
  <text x="104" y="895" font-size="24" font-weight="800" fill="#9c5f2a">共享横轴让赔率可比；区间越宽，意味着估值对假设越敏感，而不是上行空间越可靠。</text>
  <text x="70" y="974" class="axis">来源示例：公司财报、市场一致预期、内部估值模型｜截至 2026-07｜本图数据为虚构</text>
</svg>
