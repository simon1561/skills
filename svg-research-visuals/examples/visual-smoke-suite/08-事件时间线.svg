<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">事件时间线：稀疏事件不是连续趋势</title>
  <desc id="desc">按真实时间顺序展示若干离散事件，节点保持同一系列色，不使用方向箭头冒充因果。</desc>
  <style>
    text { font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
    .title { font-size:48px; font-weight:800; fill:#24221e; }.sub { font-size:22px; font-weight:400; fill:#68645c; }
    .h { font-size:22px; font-weight:700; fill:#24221e; }.body { font-size:18px; font-weight:400; fill:#45433e; }.note { font-size:16px; font-weight:400; fill:#77736b; }
    .date { font-size:18px; font-weight:600; fill:#9c5f2a; }
  </style>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text x="70" y="75" class="title">事件时间线：稀疏事件不应伪装成连续趋势</text>
  <text x="70" y="116" class="sub">示例内容，仅测试离散事件、时间顺序、因果注释和上下交错布局</text>
  <line x1="70" y1="148" x2="1530" y2="148" stroke="#dedbd3" stroke-width="2"/>
  <line x1="140" y1="470" x2="1440" y2="470" stroke="#b08d5a" stroke-width="4" stroke-linecap="round"/>
  <g fill="#c17a45">
    <circle cx="240" cy="470" r="11"/><circle cx="520" cy="470" r="11"/><circle cx="800" cy="470" r="11"/>
  </g>
  <circle cx="1360" cy="470" r="11" fill="#c17a45"/>
  <g stroke="#b08d5a" stroke-width="2"><line x1="240" y1="458" x2="240" y2="330"/><line x1="520" y1="482" x2="520" y2="610"/><line x1="800" y1="458" x2="800" y2="330"/><line x1="1360" y1="482" x2="1360" y2="610"/></g>
  <g fill="#fffdf9" stroke="#dedbd3" stroke-width="1.5"><rect x="95" y="220" width="290" height="110" rx="12"/><rect x="375" y="610" width="290" height="110" rx="12"/><rect x="655" y="220" width="290" height="110" rx="12"/><rect x="1215" y="610" width="290" height="110" rx="12"/></g>
  <g fill="#c17a45"><rect x="95" y="220" width="7" height="110" rx="3"/><rect x="375" y="610" width="7" height="110" rx="3"/><rect x="655" y="220" width="7" height="110" rx="3"/><rect x="1215" y="610" width="7" height="110" rx="3"/></g>
  <g class="date"><text x="125" y="252">2025 Q1</text><text x="405" y="642">2025 Q2</text><text x="685" y="252">2025 Q3</text><text x="1245" y="642">2026 Q1</text></g>
  <g class="h"><text x="125" y="285">宣布新战略</text><text x="405" y="675">首次调整资源</text><text x="685" y="285">经营指标验证</text><text x="1245" y="675">形成新基准</text></g>
  <g class="body"><text x="125" y="313">目标与边界被明确</text><text x="405" y="703">投入开始影响成本结构</text><text x="685" y="313">验证主链路是否成立</text><text x="1245" y="703">观察是否可持续</text></g>
  <rect x="70" y="775" width="1460" height="56" rx="12" fill="#f7f1dc" stroke="#e6ddbd" stroke-width="1.5"/>
  <text x="105" y="813" font-size="23" font-weight="800" fill="#9c5f2a">时间线表达“事件先后”，折线图表达“连续变化”；两者不能互相替代。</text>
  <text x="70" y="870" class="note">视觉压力测试 08｜检查时间顺序、节点间距、上下事件卡片和连接线不遮挡文字</text>
</svg>
