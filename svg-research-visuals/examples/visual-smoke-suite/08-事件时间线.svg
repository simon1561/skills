<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M 0 0 L 12 6 L 0 12 Z" fill="#9a8a55"/></marker></defs>
  <style>
    text { font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
    .title { font-size:48px; font-weight:800; fill:#2f2417; }.sub { font-size:22px; font-weight:400; fill:#6b5c45; }
    .h { font-size:22px; font-weight:700; fill:#2f2417; }.body { font-size:18px; font-weight:400; fill:#4b3e2c; }.note { font-size:16px; font-weight:400; fill:#7d6e54; }
    .date { font-size:18px; font-weight:600; fill:#8b572a; }
  </style>
  <rect width="1600" height="900" fill="#f8f5ef"/>
  <text x="70" y="75" class="title">事件时间线：稀疏事件不应伪装成连续趋势</text>
  <text x="70" y="116" class="sub">示例内容，仅测试离散事件、时间顺序、因果注释和上下交错布局</text>
  <line x1="70" y1="148" x2="1530" y2="148" stroke="#dfcdb1" stroke-width="2"/>
  <line x1="140" y1="470" x2="1460" y2="470" stroke="#9a8a55" stroke-width="4" marker-end="url(#arrow)"/>
  <g fill="#f0b860" stroke="#7a4a28" stroke-width="3"><circle cx="240" cy="470" r="12"/><circle cx="520" cy="470" r="12"/><circle cx="800" cy="470" r="12"/><circle cx="1360" cy="470" r="12"/></g>
  <g stroke="#b7a38a" stroke-width="2"><line x1="240" y1="458" x2="240" y2="330"/><line x1="520" y1="482" x2="520" y2="610"/><line x1="800" y1="458" x2="800" y2="330"/><line x1="1360" y1="482" x2="1360" y2="610"/></g>
  <g fill="#fdfaf5" stroke="#d7c8ad" stroke-width="1.5"><rect x="95" y="220" width="290" height="110" rx="12"/><rect x="375" y="610" width="290" height="110" rx="12"/><rect x="655" y="220" width="290" height="110" rx="12"/><rect x="1215" y="610" width="290" height="110" rx="12"/></g>
  <g fill="#c17a45"><rect x="95" y="220" width="7" height="110" rx="3"/><rect x="375" y="610" width="7" height="110" rx="3"/><rect x="655" y="220" width="7" height="110" rx="3"/><rect x="1215" y="610" width="7" height="110" rx="3"/></g>
  <g class="date"><text x="125" y="252">2025 Q1</text><text x="405" y="642">2025 Q2</text><text x="685" y="252">2025 Q3</text><text x="1245" y="642">2026 Q1</text></g>
  <g class="h"><text x="125" y="285">宣布新战略</text><text x="405" y="675">首次调整资源</text><text x="685" y="285">经营指标验证</text><text x="1245" y="675">形成新基准</text></g>
  <g class="body"><text x="125" y="313">目标与边界被明确</text><text x="405" y="703">投入开始影响成本结构</text><text x="685" y="313">验证主链路是否成立</text><text x="1245" y="703">观察是否可持续</text></g>
  <rect x="70" y="775" width="1460" height="56" rx="12" fill="#2e2a25" stroke="#b08d5a" stroke-width="2"/>
  <text x="105" y="813" font-size="23" font-weight="800" fill="#f0b860">时间线表达“事件先后”，折线图表达“连续变化”；两者不能互相替代。</text>
  <text x="70" y="870" class="note">视觉压力测试 08｜检查时间顺序、节点间距、上下事件卡片和连接线不遮挡文字</text>
</svg>
