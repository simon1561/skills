<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">分层叙事：监管变化如何穿透平台价值</title>
  <desc id="desc">用虚构平台监管案例演示发生了什么、公司如何应对、产生何种取舍和估值如何变化的四层叙事，并给出可验证信号。</desc>
  <style>
    text{font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif}
    .title{font-size:48px;font-weight:800;fill:#24221e}.sub{font-size:23px;font-weight:400;fill:#68645c}
    .h{font-size:24px;font-weight:800;fill:#9c5f2a}.h2{font-size:20px;font-weight:700;fill:#24221e}
    .body{font-size:18px;font-weight:400;fill:#45433e}.note{font-size:15px;font-weight:400;fill:#77736b}
    .band{fill:#fffdf9;stroke:#dedbd3;stroke-width:1.8}
  </style>
  <rect width="1600" height="1000" fill="#fbfaf7"/>
  <text x="70" y="76" class="title">分层叙事：监管变化如何穿透平台价值</text>
  <text x="70" y="116" class="sub">虚构案例｜规则变化 → 经营应对 → 利润取舍 → 估值含义；四层逐级展开，但不假定精确因果</text>
  <line x1="70" y1="146" x2="1530" y2="146" stroke="#dedbd3" stroke-width="2"/>

  <!-- narrative spine -->
  <line x1="145" y1="235" x2="145" y2="700" stroke="#b08d5a" stroke-width="4"/>
  <g fill="#f3e9da" stroke="#b08d5a" stroke-width="3"><circle cx="145" cy="245" r="25"/><circle cx="145" cy="395" r="25"/><circle cx="145" cy="545" r="25"/><circle cx="145" cy="695" r="25"/></g>
  <g text-anchor="middle" font-size="20" font-weight="800" fill="#7a4a28"><text x="145" y="252">1</text><text x="145" y="402">2</text><text x="145" y="552">3</text><text x="145" y="702">4</text></g>

  <!-- layer 1 -->
  <rect x="205" y="185" width="1325" height="120" rx="12" class="band"/>
  <text x="240" y="225" class="h">发生了什么｜平台费率上限与数据审计同时收紧</text>
  <text x="240" y="260" class="body">新规限制核心交易费率，并要求平台解释推荐排序、保存商家申诉记录</text>
  <text x="240" y="289" class="body">直接影响不只是一次性合规支出，而是原有变现方式和运营流程</text>

  <!-- layer 2 -->
  <rect x="205" y="335" width="1325" height="120" rx="12" class="band"/>
  <text x="240" y="375" class="h">公司如何应对｜重做变现组合与商家治理</text>
  <text x="240" y="410" class="body">减少高费率促销，增加广告、履约和数据工具等商家服务收入</text>
  <text x="240" y="439" class="body">同步增加审核人员、申诉系统和算法解释能力，降低持续违规风险</text>

  <!-- layer 3 -->
  <rect x="205" y="485" width="1325" height="120" rx="12" class="band"/>
  <text x="240" y="525" class="h">产生什么取舍｜近期利润承压，长期信任可能改善</text>
  <text x="240" y="560" class="body">负面：交易费率下降、合规成本上升，新服务变现需要时间</text>
  <text x="240" y="589" class="body">正面：商家申诉更透明、低质供给减少，留存与生态稳定性可能提高</text>

  <!-- layer 4 -->
  <rect x="205" y="635" width="1325" height="120" rx="12" class="band"/>
  <text x="240" y="675" class="h">最终意味着什么｜估值取决于新模式能否补回旧利润</text>
  <text x="240" y="710" class="body">短期盈利下修是直接结果；长期价值取决于新服务收入、商家留存和现金转换率</text>
  <text x="240" y="739" class="body">不能只把一次性罚款从净现金扣除，也不能假定所有合规投入都会产生回报</text>

  <!-- monitoring -->
  <rect x="70" y="805" width="1460" height="130" rx="12" fill="#f7f1dc" stroke="#e6ddbd" stroke-width="1.5"/>
  <text x="105" y="846" font-size="24" font-weight="800" fill="#9c5f2a">验证叙事，而不是相信叙事：四个后续信号</text>
  <text x="105" y="888" font-size="18" font-weight="700" fill="#24221e">实际费率与take rate</text>
  <text x="430" y="888" font-size="18" font-weight="700" fill="#24221e">合规成本占收入比例</text>
  <text x="800" y="888" font-size="18" font-weight="700" fill="#24221e">商家留存与申诉解决率</text>
  <text x="1225" y="888" font-size="18" font-weight="700" fill="#24221e">自由现金流恢复速度</text>
  <text x="70" y="974" class="note">来源：虚构示例｜仅用于验证发生—应对—取舍—价值含义的分层叙事结构</text>
</svg>
