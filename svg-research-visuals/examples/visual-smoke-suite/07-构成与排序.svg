<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">构成与排序：区分占比与规模</title>
  <desc id="desc">用虚构数据并列展示百分比构成与数值排序，强调两类问题需要不同图形编码。</desc>
  <defs><clipPath id="stack-clip"><rect x="135" y="340" width="490" height="72" rx="10"/></clipPath></defs>
  <style>
    text { font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
    .title { font-size:48px; font-weight:800; fill:#24221e; }.sub { font-size:22px; font-weight:400; fill:#68645c; }
    .h { font-size:23px; font-weight:700; fill:#24221e; }.body { font-size:19px; font-weight:400; fill:#45433e; }.note { font-size:16px; font-weight:400; fill:#77736b; }
    .num { font-size:20px; font-weight:700; fill:#24221e; font-variant-numeric:tabular-nums lining-nums; font-feature-settings:"tnum" 1,"lnum" 1; }
  </style>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text x="70" y="75" class="title">构成与排序：先区分“占比”与“规模”</text>
  <text x="70" y="116" class="sub">示例数据，仅测试100%堆叠、排序条形图、直接标注与颜色的一致性</text>
  <line x1="70" y1="148" x2="1530" y2="148" stroke="#dedbd3" stroke-width="2"/>
  <rect x="70" y="190" width="670" height="610" rx="14" fill="#fffdf9" stroke="#dedbd3" stroke-width="1.5"/>
  <text x="110" y="235" class="h">构成：收入来源占比</text><text x="110" y="266" class="note">单位：% ｜ 总和固定为100%</text>
  <g clip-path="url(#stack-clip)">
    <rect x="135" y="340" width="221" height="72" fill="#7a4a28"/>
    <rect x="356" y="340" width="147" height="72" fill="#94612f"/>
    <rect x="503" y="340" width="74" height="72" fill="#ab7642"/>
    <rect x="577" y="340" width="48" height="72" fill="#ecdcc6"/>
  </g>
  <text x="246" y="384" text-anchor="middle" font-size="24" font-weight="800" fill="#f0e8da">45%</text>
  <text x="429" y="384" text-anchor="middle" font-size="22" font-weight="800" fill="#f0e8da">30%</text>
  <text x="540" y="384" text-anchor="middle" font-size="19" font-weight="800" fill="#f0e8da">15%</text>
  <text x="601" y="384" text-anchor="middle" font-size="17" font-weight="700" fill="#5a4028">10%</text>
  <g class="body"><text x="135" y="490">核心业务</text><text x="135" y="536">增值服务</text><text x="135" y="582">海外业务</text><text x="135" y="628">其他</text></g>
  <g><rect x="300" y="470" width="18" height="18" rx="3" fill="#7a4a28"/><rect x="300" y="516" width="18" height="18" rx="3" fill="#94612f"/><rect x="300" y="562" width="18" height="18" rx="3" fill="#ab7642"/><rect x="300" y="608" width="18" height="18" rx="3" fill="#ecdcc6"/></g>
  <g class="num" text-anchor="end"><text x="585" y="490">45%</text><text x="585" y="536">30%</text><text x="585" y="582">15%</text><text x="585" y="628">10%</text></g>
  <text x="110" y="720" class="note">读法：构成比较的是“相对份额”，不说明绝对规模。</text>

  <rect x="780" y="190" width="750" height="610" rx="14" fill="#fffdf9" stroke="#dedbd3" stroke-width="1.5"/>
  <text x="820" y="235" class="h">排序：各业务的绝对规模</text><text x="820" y="266" class="note">单位：亿元 ｜ 从大到小排列</text>
  <g class="body"><text x="820" y="358">核心业务</text><text x="820" y="450">增值服务</text><text x="820" y="542">海外业务</text><text x="820" y="634">其他</text></g>
  <g fill="#c17a45"><rect x="965" y="325" width="440" height="42" rx="6"/><rect x="965" y="417" width="310" height="42" rx="6"/><rect x="965" y="509" width="190" height="42" rx="6"/><rect x="965" y="601" width="110" height="42" rx="6"/></g>
  <g class="num"><text x="1425" y="356">540</text><text x="1295" y="448">380</text><text x="1175" y="540">230</text><text x="1095" y="632">130</text></g>
  <g stroke="#e6e3dc" stroke-width="1"><line x1="965" y1="385" x2="1450" y2="385"/><line x1="965" y1="477" x2="1450" y2="477"/><line x1="965" y1="569" x2="1450" y2="569"/></g>
  <text x="820" y="720" class="note">读法：规模使用长度与排序；不要把“占比高”误读为“规模最大”。</text>
  <rect x="70" y="830" width="1460" height="50" rx="12" fill="#f7f1dc" stroke="#e6ddbd" stroke-width="1.5"/>
  <text x="105" y="864" font-size="22" font-weight="800" fill="#9c5f2a">构成用100%堆叠，规模用排序条形图；同一组颜色只能表达同一种分类关系。</text>
</svg>
